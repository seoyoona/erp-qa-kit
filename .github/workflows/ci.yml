name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run ruff check erpqa tests
      - run: uv run python -m unittest discover -v
      - run: uv run coverage run -m unittest discover
      - run: uv run coverage report --fail-under=95
      - run: rg -i "anasa|fe_anasa|be_anasa|qc_iqc" erpqa tests README.md docs/*.md examples && exit 1 || exit 0
      - run: uv build
      - run: ERPQA_RUN_PACKAGING_SMOKE=1 uv run python -m unittest tests.test_packaging_smoke -v
      - run: uv run python -m erpqa validate examples/pipe-manufacturing-demo
      - run: uv run python -m erpqa quality-validate examples/pipe-manufacturing-demo
      - run: uv run python -m erpqa trust-score examples/pipe-manufacturing-demo
      - run: uv run python -m erpqa final-qa-signoff examples/pipe-manufacturing-demo --module DEMO
      - run: uv run pip-audit
